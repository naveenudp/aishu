<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️ Our Beautiful Memories ❤️</title>
<style>
*{box-sizing:border-box}
body{
margin:0;font-family:Segoe UI,Tahoma,sans-serif;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
min-height:100vh;color:#fff;overflow-x:hidden;
}
.hearts{position:fixed;inset:0;pointer-events:none;z-index:0}
.heart{position:absolute;animation:float 10s linear infinite;font-size:24px;opacity:.5}
@keyframes float{from{transform:translateY(100vh)}to{transform:translateY(-120px)}}
.container{position:relative;z-index:1;max-width:1000px;margin:auto;padding:20px}
.card{
background:rgba(255,255,255,.15);
backdrop-filter:blur(12px);
border-radius:24px;padding:24px;margin-top:20px;
box-shadow:0 8px 30px rgba(0,0,0,.2)
}
input{
width:100%;padding:14px;border:none;border-radius:12px;margin:10px 0
}
button{
padding:12px 22px;border:none;border-radius:12px;
background:#ff2d75;color:#fff;font-weight:bold;cursor:pointer
}
button:hover{transform:scale(1.03)}
.hidden{display:none}
#typewriter{white-space:pre-line}
.level-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:15px}
.level{
padding:20px;border-radius:16px;text-align:center;font-weight:bold
}
.locked{background:#666}
.unlocked{
background:linear-gradient(135deg,#ff2d75,#ffbf47);
cursor:pointer;box-shadow:0 0 0 0 rgba(255,255,255,.72);
animation:currentLevelPulse 1.6s ease-in-out infinite
}
.completed{background:#2f9d58;cursor:pointer}
.completed::after{content:" ✓"}
#levelTitle{
display:flex;align-items:center;justify-content:center;gap:12px;
width:fit-content;max-width:100%;margin:0 auto 22px;padding:10px 24px;
border-radius:999px;background:linear-gradient(135deg,rgba(255,255,255,.28),rgba(255,45,117,.42));
box-shadow:0 12px 28px rgba(119,0,52,.22),inset 0 1px 0 rgba(255,255,255,.38);
font-family:Georgia,"Times New Roman",serif;font-size:2.05rem;font-weight:800;
line-height:1.15;color:#fff;text-align:center;text-shadow:0 4px 16px rgba(119,0,52,.32)
}
#levelTitle::before,#levelTitle::after{
content:"♥";font-size:1rem;color:#ffe4ef;text-shadow:0 2px 10px rgba(119,0,52,.3)
}
.memory-frame{
overflow:hidden;border-radius:22px;
background:rgba(255,255,255,.18);
box-shadow:0 18px 45px rgba(116,12,57,.22),inset 0 1px 0 rgba(255,255,255,.28)
}
.memory-image-wrap{
padding:18px;background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.02))
}
img.memory{
display:block;width:min(440px,100%);aspect-ratio:1;margin:0 auto;object-fit:cover;
-webkit-mask:url("data:image/svg+xml,%3Csvg viewBox='0 0 100 92' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath fill='black' d='M50 86C21 60 5 45 5 27C5 12 16 2 31 2C40 2 47 7 50 14C53 7 60 2 69 2C84 2 95 12 95 27C95 45 79 60 50 86Z'/%3E%3C/svg%3E") center/contain no-repeat;
mask:url("data:image/svg+xml,%3Csvg viewBox='0 0 100 92' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath fill='black' d='M50 86C21 60 5 45 5 27C5 12 16 2 31 2C40 2 47 7 50 14C53 7 60 2 69 2C84 2 95 12 95 27C95 45 79 60 50 86Z'/%3E%3C/svg%3E") center/contain no-repeat;
filter:drop-shadow(0 16px 24px rgba(104,0,43,.24))
}
.memory-note{
width:100%;padding:20px 22px 18px;
background:linear-gradient(135deg,rgba(255,255,255,.24),rgba(255,255,255,.1));
border-bottom:1px solid rgba(255,255,255,.22)
}
.memory-note h3{
display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap;
width:fit-content;max-width:100%;margin:0 auto 12px;padding:8px 18px;
border-radius:999px;background:linear-gradient(135deg,rgba(255,45,117,.9),rgba(255,191,71,.74));
box-shadow:0 8px 22px rgba(161,0,70,.22),inset 0 1px 0 rgba(255,255,255,.36);
text-align:center;font-size:1.18rem;letter-spacing:0;font-weight:800;
text-shadow:0 2px 10px rgba(105,0,47,.26)
}
.memory-note h3::before,.memory-note h3::after,.question-title::before,.question-title::after{
content:"";width:28px;height:1px;background:rgba(255,255,255,.72)
}
.memory-text{
max-width:640px;margin:0 auto;padding:12px 16px;text-align:center;
border-radius:14px;background:rgba(255,255,255,.64);color:#7b123f;
font-family:Georgia,"Times New Roman",serif;font-size:1.12rem;line-height:1.72;
font-weight:600;text-shadow:none
}
.question-panel{
margin-top:18px;padding:18px 20px;
border-radius:18px;background:rgba(255,255,255,.14);
box-shadow:inset 0 1px 0 rgba(255,255,255,.22)
}
.question-title{
display:flex;align-items:center;justify-content:center;gap:12px;
width:fit-content;max-width:100%;margin:0 auto 14px;padding:8px 18px;
border-radius:999px;background:linear-gradient(135deg,rgba(255,45,117,.88),rgba(255,126,179,.7));
box-shadow:0 8px 22px rgba(161,0,70,.18),inset 0 1px 0 rgba(255,255,255,.32);
text-align:center;font-size:1.14rem;font-weight:800;
text-shadow:0 2px 10px rgba(105,0,47,.24)
}
#questionText{
max-width:760px;margin:0 auto;padding:14px 16px;
border-radius:14px;background:rgba(255,255,255,.62);color:#7b123f;
font-family:Georgia,"Times New Roman",serif;font-size:1.1rem;line-height:1.72;font-weight:600;
text-align:left;text-shadow:none
}
.message{font-size:1.1rem;margin-top:15px}
.final{font-size:2rem;text-align:center}
.final-heart{
display:inline-flex;align-items:center;justify-content:center;
padding:4px 8px;cursor:pointer;border-radius:999px;
transition:transform .18s ease,filter .18s ease
}
.final-heart:hover,.final-heart:focus{transform:scale(1.15);filter:drop-shadow(0 6px 14px rgba(130,0,58,.28));outline:none}
.footer{opacity:.8;margin-top:20px;text-align:center}
.loader{
position:fixed;inset:0;z-index:10000;
display:flex;align-items:center;justify-content:center;
background:rgba(40,10,26,.58);backdrop-filter:blur(6px)
}
.loader.hidden{display:none}
.heartbeat{
font-size:72px;line-height:1;
animation:heartbeat 1s ease-in-out infinite;
filter:drop-shadow(0 12px 24px rgba(0,0,0,.28))
}
.result-animation{
position:fixed;inset:0;z-index:9999;pointer-events:none;
display:flex;align-items:center;justify-content:center;
font-size:84px;text-align:center
}
.result-animation.hidden{display:none}
.success-pop{
animation:successPop 1.15s ease-out both;
text-shadow:0 10px 28px rgba(0,0,0,.28)
}
.failure-pop{
animation:failurePop .75s ease-out both;
text-shadow:0 10px 28px rgba(0,0,0,.28)
}
.success-sparkle{
position:absolute;font-size:28px;
animation:sparkleBurst 1.1s ease-out both
}
.shake{
animation:softShake .42s ease-in-out both
}
@keyframes heartbeat{
0%,100%{transform:scale(1)}
14%{transform:scale(1.22)}
28%{transform:scale(.96)}
42%{transform:scale(1.16)}
70%{transform:scale(1)}
}
@keyframes successPop{
0%{transform:scale(.45);opacity:0}
35%{transform:scale(1.18);opacity:1}
70%{transform:scale(1)}
100%{transform:scale(.98);opacity:0}
}
@keyframes failurePop{
0%{transform:translateY(12px) scale(.7);opacity:0}
35%{transform:translateY(0) scale(1.08);opacity:1}
100%{transform:translateY(-8px) scale(.96);opacity:0}
}
@keyframes sparkleBurst{
0%{transform:translate(0,0) scale(.4);opacity:0}
25%{opacity:1}
100%{transform:translate(var(--x),var(--y)) scale(1.2);opacity:0}
}
@keyframes softShake{
0%,100%{transform:translateX(0)}
20%{transform:translateX(-10px)}
40%{transform:translateX(9px)}
60%{transform:translateX(-6px)}
80%{transform:translateX(4px)}
}
@keyframes currentLevelPulse{
0%,100%{box-shadow:0 0 0 0 rgba(255,255,255,.62)}
50%{box-shadow:0 0 0 8px rgba(255,255,255,0)}
}
@media (max-width:520px){
.card{padding:18px}
.memory-note{padding:16px 12px}
.memory-note h3,.question-title{width:100%;gap:6px;padding:9px 12px;font-size:1rem;line-height:1.25}
.memory-note h3::before,.memory-note h3::after,.question-title::before,.question-title::after{display:none}
#levelTitle{font-size:1.55rem;padding:9px 18px}
}
</style>
</head>
<body>

<div class="loader hidden" id="loader" aria-live="polite" aria-label="Loading">
  <div class="heartbeat">❤️</div>
</div>
<div class="result-animation hidden" id="resultAnimation"></div>
<div class="hearts" id="hearts"></div>

<div class="container">
<div class="card" id="landing">
<h1>❤️ Welcome My Love ❤️</h1>
<p id="typewriter"></p>
<button onclick="showLogin()">Start Our Journey</button>
</div>

<div class="card hidden" id="loginCard">
<h2>📱 Login</h2>
<p>Enter your mobile number to begin ❤️</p>
<input id="mobile" placeholder="8*9*8*3*80">
<button onclick="login()">Unlock Journey</button>
</div>

<div class="card hidden" id="dashboard">
<h2>❤️ Our Beautiful Memories ❤️</h2>
<div id="levelGrid" class="level-grid"></div>
<br>

</div>

<div class="card hidden" id="questionCard">
<h2 id="levelTitle"></h2>
<div class="memory-frame">
<div class="memory-note">
<h3>❤️ A Little Note For You ❤️</h3>
<p class="memory-text" id="memoryText"></p>
</div>
<div class="memory-image-wrap">
<img class="memory" id="levelImage" src="https://picsum.photos/900/400">
</div>
</div>
<div class="question-panel">
<h3 class="question-title">❤️ Question For You ❤️</h3>
<p id="questionText"></p>
</div>
<input id="answerBox" placeholder="Your answer ❤️">
<button onclick="submitAnswer()">Submit</button>
<button onclick="goDashboard()">Back</button>
<div class="message" id="resultMsg"></div>
</div>

<div class="card hidden" id="finalCard">
  <div class="final">
  <span class="final-heart" role="button" tabindex="0" onclick="showDashboard()" onkeydown="handleFinalHeartKey(event)">❤️</span>
  Congratulations
  <span class="final-heart" role="button" tabindex="0" onclick="showDashboard()" onkeydown="handleFinalHeartKey(event)">❤️</span><br><br>
  You unlocked every memory.<br><br>
  Will you continue creating memories with me forever?
  <br><br>
  <button onclick="submitFinalAnswer()">
  YES ❤️
  </button>
  </div>
  </div>
  
<script>
const MOBILE="8197833280";
const ANSWER_API_URL="https://script.google.com/macros/s/AKfycbzMcFCZT7yB9LMlxUb917GEaojxjh32SbDdwMi2X98LgXdSITz9xxbdPoUSsBGZa0Wn/exec";
const LEVELS_API_URL=ANSWER_API_URL;
const SESSION_ID=localStorage.getItem("sessionId")||(crypto.randomUUID?crypto.randomUUID():String(Date.now()));
const AUTH_MOBILE_KEY="loveJourneyMobile";
localStorage.setItem("sessionId",SESSION_ID);
let currentMobile="";

let levels=[];
let levelsLoaded=false;
let currentLevel=1;
let journeyCompleted=false;
let completedLevels=[];
let selectedLevel=1;
let sharedLevelImage="";

function showLogin(){
 document.getElementById("landing").classList.add("hidden");
 document.getElementById("loginCard").classList.remove("hidden");
}

async function login(){
	 const m=document.getElementById("mobile").value.replace(/\s+/g,"");
	 if(m!==MOBILE){alert("Invalid mobile number ❤️");return;}
	 currentMobile=m;
	 localStorage.setItem(AUTH_MOBILE_KEY,m);
	 await enterJourney();
}

async function enterJourney(){
	 showLoader();
	 await loadLevels();
	 await loadProgressOnline();
	 hideLoader();
	 if(!levels.length){alert("Levels are not available yet. Please check the Levels sheet.");return;}
	 syncPendingAttempts();
	 document.getElementById("landing").classList.add("hidden");
	 document.getElementById("loginCard").classList.add("hidden");
	 document.getElementById("dashboard").classList.add("hidden");
	 document.getElementById("questionCard").classList.add("hidden");
	 document.getElementById("finalCard").classList.add("hidden");

 if(journeyCompleted){
   rememberDashboardHistory();
   history.pushState({view:"final"},"");
   showFinalCard();
   return;
 }

 document.getElementById("dashboard").classList.remove("hidden");
 renderLevels();
}

function renderLevels(){
 if(!levels.length){
   document.getElementById("levelGrid").innerHTML="Levels are not available yet.";
   return;
 }

 let html="";
 for(let i=1;i<=levels.length;i++){
   let cls="locked";

   if(completedLevels.includes(i)){
      cls="completed";
   }else if(i===currentLevel){
      cls="unlocked";
   }

   html+=`<div class="${cls} level" ${i<=currentLevel?`onclick="openLevel(${i})"`:""}>
   ${i<=currentLevel?"❤️":"🔒"}<br>Level ${i}</div>`;
 }
 document.getElementById("levelGrid").innerHTML=html;
}

function openLevel(id){
	 selectedLevel=id;
	 rememberDashboardHistory();
	 history.pushState({view:"level",level:id},"");
	 document.getElementById("finalCard").classList.add("hidden");
	 document.getElementById("dashboard").classList.add("hidden");
	 document.getElementById("questionCard").classList.remove("hidden");
 document.getElementById("levelTitle").innerText="Level "+id;
 document.getElementById("memoryText").innerText=levels[id-1].memory||"";
 document.getElementById("questionText").innerText=levels[id-1].q;
 document.getElementById("answerBox").value="";
 document.getElementById("resultMsg").innerText="";
 document.getElementById("levelImage").src=getLevelImage(id);
	}

function getLevelImage(id){
 return sharedLevelImage||`https://picsum.photos/seed/love5/900/400`;
}

async function submitAnswer(){
	 const answerInput=document.getElementById("answerBox");
	 const answer=answerInput.value;
	 answerInput.value="";

	 let attempts=JSON.parse(localStorage.getItem("attempts")||"[]");
	 const attempt={
	   sessionId:SESSION_ID,
	   mobile:currentMobile,
	   level:selectedLevel,
	   question:levels[selectedLevel-1].q,
	   answer:answer,
	   result:"",
	   time:new Date().toLocaleString(),
	   completed:false
	 };

	 showLoader();
	 const validation=await validateAnswerOnline(attempt);
	 hideLoader();
	 if(!validation){
	   document.getElementById("resultMsg").innerHTML="Unable to check the answer. Please try again ❤️";
	   return;
	 }

	 const correct=validation.correct;
	 if(validation.progress){applyProgress(validation.progress);}
	 attempt.result=correct?"Correct":"Wrong";
	 attempt.completed=journeyCompleted;
	 attempts.push(attempt);
	 localStorage.setItem("attempts",JSON.stringify(attempts));

	 if(correct){
   playResultAnimation(true);
   document.getElementById("resultMsg").innerHTML=
   "✅ Correct!";

	   setTimeout(()=>{
	      if(journeyCompleted){
	         document.getElementById("questionCard").classList.add("hidden");
	         history.replaceState({view:"final"},"");
	         showFinalCard();
	      }else{
	         goDashboard();
	      }
   },1800);
 }else{
   playResultAnimation(false);
   document.getElementById("resultMsg").innerHTML="❌ Not quite... Try again ❤️";
	 }
	}

async function saveAttemptOnline(attempt){
	 if(!ANSWER_API_URL){return;}

	 try{
	   await fetch(ANSWER_API_URL,{
	     method:"POST",
	     headers:{"Content-Type":"text/plain;charset=utf-8"},
	     body:JSON.stringify(attempt)
	   });
	 }catch(error){
	   const pending=JSON.parse(localStorage.getItem("pendingOnlineAttempts")||"[]");
	   pending.push(attempt);
	   localStorage.setItem("pendingOnlineAttempts",JSON.stringify(pending));
	 }
}

async function submitFinalAnswer(){
 const finalAttempt={
   sessionId:SESSION_ID,
   mobile:currentMobile||MOBILE,
   level:"Final",
   question:"Will you continue creating memories with me forever?",
   answer:"YES ❤️",
   result:"Accepted",
   time:new Date().toLocaleString(),
   completed:true,
   event:"final_yes_clicked"
 };

 showLoader();
 await saveAttemptOnline(finalAttempt);
 hideLoader();

 alert("❤️ Forever and Always ❤️");
 showDashboard();
}

async function validateAnswerOnline(attempt){
	 if(!ANSWER_API_URL){return null;}

	 try{
	   const response=await fetch(ANSWER_API_URL,{
	     method:"POST",
	     headers:{"Content-Type":"text/plain;charset=utf-8"},
	     body:JSON.stringify({
	       ...attempt,
	       action:"validate_answer"
	     })
	   });

	   return await response.json();
	 }catch(error){
	   return null;
	 }
}

async function loadProgressOnline(){
	 if(!ANSWER_API_URL||!currentMobile){return;}

	 try{
	   const response=await fetch(ANSWER_API_URL,{
	     method:"POST",
	     headers:{"Content-Type":"text/plain;charset=utf-8"},
	     body:JSON.stringify({
	       action:"get_progress",
	       mobile:currentMobile
	     })
	   });
	   const data=await response.json();
	   if(data.progress){applyProgress(data.progress);}
	 }catch(error){
	   completedLevels=[];
	   currentLevel=1;
	   journeyCompleted=false;
	 }
}

async function resetProgressOnline(){
	 if(!ANSWER_API_URL){return;}

	 try{
	   await fetch(ANSWER_API_URL,{
	     method:"POST",
	     headers:{"Content-Type":"text/plain;charset=utf-8"},
	     body:JSON.stringify({
	       action:"reset_progress",
	       mobile:currentMobile||MOBILE
	     })
	   });
	 }catch(error){}
}

function applyProgress(progress){
 completedLevels=Array.isArray(progress.completedLevels)?progress.completedLevels:[];
 journeyCompleted=progress.journeyCompleted===true;
 currentLevel=Number(progress.currentLevel)||1;
 if(levels.length){
   currentLevel=Math.min(Math.max(currentLevel,1),levels.length);
 }
}

async function syncPendingAttempts(){
	 if(!ANSWER_API_URL){return;}

	 const pending=JSON.parse(localStorage.getItem("pendingOnlineAttempts")||"[]");
	 if(!pending.length){return;}

	 localStorage.removeItem("pendingOnlineAttempts");
	 for(const attempt of pending){
	   await saveAttemptOnline(attempt);
	 }
}

async function loadLevels(){
	 if(levelsLoaded||!LEVELS_API_URL){return;}

	 try{
	   const response=await fetch(`${LEVELS_API_URL}?t=${Date.now()}`,{cache:"no-store"});
	   const data=await response.json();

	   if(Array.isArray(data.levels)&&data.levels.length){
	     levels=useFifthLevelImage(data.levels);
	     if(journeyCompleted){currentLevel=levels.length;}
	     currentLevel=Math.min(currentLevel,levels.length);
	     levelsLoaded=true;
	     if(!document.getElementById("dashboard").classList.contains("hidden")){
	       renderLevels();
	     }
	   }
	 }catch(error){
	   levels=[];
	 }
}

function useFifthLevelImage(levelData){
 const levelFive=levelData.find(level=>Number(level.level)===5)||levelData[4];
 const sharedImage=levelFive&&levelFive.image;
 sharedLevelImage=sharedImage||"";
 return levelData.map(level=>({
   ...level,
   image:sharedLevelImage
 }));
}

function showLoader(){
 document.getElementById("loader").classList.remove("hidden");
}

function hideLoader(){
 document.getElementById("loader").classList.add("hidden");
}

function playResultAnimation(success){
 const animation=document.getElementById("resultAnimation");
 animation.className="result-animation";
 animation.innerHTML=success?successAnimationHtml():failureAnimationHtml();

 if(!success){
   const card=document.getElementById("questionCard");
   card.classList.remove("shake");
   void card.offsetWidth;
   card.classList.add("shake");
 }

 setTimeout(()=>{
   animation.className="result-animation hidden";
   animation.innerHTML="";
   document.getElementById("questionCard").classList.remove("shake");
 },success?1150:750);
}

function successAnimationHtml(){
 const sparkles=[
   ["-120px","-72px"],["110px","-88px"],["-96px","72px"],
   ["128px","66px"],["0","-128px"],["0","118px"]
 ];
 return `<div class="success-pop">❤️</div>`+
   sparkles.map(([x,y])=>`<span class="success-sparkle" style="--x:${x};--y:${y}">✨</span>`).join("");
}

function failureAnimationHtml(){
 return `<div class="failure-pop">💔</div>`;
}

function goDashboard(fromBrowserBack){
 if(!fromBrowserBack&&history.state&&(history.state.view==="level"||history.state.view==="final")){
   history.back();
   return;
 }
 showDashboard();
}

function showDashboard(){
	 document.getElementById("questionCard").classList.add("hidden");
	 document.getElementById("finalCard").classList.add("hidden");
	 document.getElementById("dashboard").classList.remove("hidden");
	 renderLevels();
}

function showFinalCard(){
 document.getElementById("dashboard").classList.add("hidden");
 document.getElementById("questionCard").classList.add("hidden");
 document.getElementById("finalCard").classList.remove("hidden");
}

function handleFinalHeartKey(event){
 if(event.key==="Enter"||event.key===" "){
   event.preventDefault();
   showDashboard();
 }
}

function rememberDashboardHistory(){
 if(!history.state||history.state.view!=="dashboard"){
   history.replaceState({view:"dashboard"},"");
 }
}

window.addEventListener("popstate",()=>{
 if(!document.getElementById("questionCard").classList.contains("hidden")||
    !document.getElementById("finalCard").classList.contains("hidden")){
   goDashboard(true);
 }
});

const text="Every memory is beautiful...\nBut my favorite memories are the ones that include you. ❤️";
let idx=0;
function typeWriter(){
 if(idx<text.length){
  document.getElementById("typewriter").innerHTML+=text.charAt(idx++);
  setTimeout(typeWriter,45);
 }
}
typeWriter();
restoreSession();

async function restoreSession(){
 const savedMobile=localStorage.getItem(AUTH_MOBILE_KEY);
 if(savedMobile!==MOBILE){loadLevels();return;}

 currentMobile=savedMobile;
 await enterJourney();
}

for(let i=0;i<25;i++){
 const h=document.createElement("div");
 h.className="heart";
 h.innerHTML="❤️";
 h.style.left=Math.random()*100+"%";
 h.style.animationDuration=(6+Math.random()*8)+"s";
 h.style.fontSize=(18+Math.random()*20)+"px";
 document.getElementById("hearts").appendChild(h);
}
</script>
</body>
</html>
